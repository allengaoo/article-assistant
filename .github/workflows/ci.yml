name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            webapp/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install webapp dependencies
        run: npm ci --prefix webapp

      - name: Run unit tests
        run: npm test

      - name: Shell script syntax check
        run: bash -n scripts/disk-cleanup.sh && bash -n scripts/remote-deploy.sh && bash -n scripts/remote-publish.sh

      - name: Secret pattern scan
        run: |
          ! git grep -E '(sk-[a-zA-Z0-9]{20,}|AppSecret=|ACCESS_TOKEN=[^x]|MASTER_KEY=[^W]|FEISHU_APP_SECRET=[^O])' \
            -- ':!*.example' ':!.github/workflows/*.yml' || (echo 'Possible secret detected' && exit 1)
