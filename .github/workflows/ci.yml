name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            webapp/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install webapp dependencies
        run: npm ci --prefix webapp

      - name: Run tests (unit + e2e)
        run: npm test
        env:
          NODE_ENV: test

      - name: Shell script syntax check
        run: bash -n scripts/disk-cleanup.sh && bash -n scripts/remote-deploy.sh && bash -n scripts/remote-publish.sh && bash -n scripts/secret-scan.sh

      - name: Secret & sensitive file scan
        run: bash scripts/secret-scan.sh
